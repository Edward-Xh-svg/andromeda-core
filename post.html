<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MALINES PENTAGON — عرض المنشور</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="post">

  <div class="classification-bar">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>

  <!-- TOPBAR -->
  <header class="topbar" style="top:22px">
    <div class="topbar-brand">
      <div class="brand-seal">MP</div>
      <div>
        <h1>MALINES PENTAGON</h1>
        <span>وزارة الدفاع الأمريكية — الشبكة الرسمية</span>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <span>مرحباً، <span class="username" id="topbar-username">—</span></span>
        <div class="avatar" id="topbar-avatar">—</div>
      </div>
      <button id="btn-logout" class="btn btn-outline btn-sm">خروج</button>
    </div>
  </header>

  <div class="app-layout" style="margin-top:22px">

    <nav class="app-sidebar">
      <div class="nav-section-label">التنقل</div>
      <a href="/index.html" class="nav-link">
        <span class="nav-icon">&#9632;</span> التغذية الإخبارية
      </a>
      <a href="/profile.html" class="nav-link">
        <span class="nav-icon">&#9670;</span> ملفي الشخصي
      </a>
      <a href="/messages.html" class="nav-link">
        <span class="nav-icon">&#9679;</span> الرسائل الخاصة
      </a>
    </nav>

    <main class="app-main">
      <div style="margin-bottom:16px">
        <a href="javascript:history.back()" class="btn btn-outline btn-sm">&#8594; رجوع</a>
      </div>

      <div class="section-header">
        <h2>المنشور</h2>
      </div>

      <div id="post-container"></div>
      <div id="comments-container"></div>
    </main>

    <aside class="app-aside">
      <div class="widget">
        <div class="widget-header">مشاركة المنشور</div>
        <div class="widget-body">
          <p style="font-size:12px;color:var(--muted);margin-bottom:10px">شارك هذا المنشور مع زملائك عبر الرابط المباشر.</p>
          <button class="btn btn-navy btn-sm btn-block" onclick="copyCurrentLink()">نسخ الرابط</button>
        </div>
      </div>
    </aside>

  </div>

  <div id="toast-container"></div>

  <script>
    function copyCurrentLink() {
      navigator.clipboard.writeText(window.location.href)
        .then(() => showToast('تم نسخ الرابط'))
        .catch(() => showToast('تعذّر النسخ'));
    }
  </script>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/posts.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
