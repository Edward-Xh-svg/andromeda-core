<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القوى العظمى - 1926</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-container">
            <div class="login-header">
                <div class="military-insignia">
                    <div class="insignia-star"></div>
                </div>
                <h1 class="login-title">القيادة العسكرية العليا</h1>
                <p class="login-subtitle">النظام الدبلوماسي المشفر - 1926</p>
            </div>
            
            <div class="login-form">
                <div class="input-group">
                    <label class="input-label">اختيار الدولة</label>
                    <select id="nationSelect" class="military-select">
                        <option value="">-- اختر دولتك --</option>
                        <option value="usa">الولايات المتحدة الأمريكية</option>
                        <option value="malines">دولة مالينس</option>
                        <option value="soviet">الاتحاد السوفيتي</option>
                        <option value="china">الإمبراطورية الصينية</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label class="input-label">الممثل الدبلوماسي</label>
                    <input type="text" id="representativeInput" class="military-input" 
                           placeholder="أدخل اسم الممثل الدبلوماسي">
                </div>
                
                <div class="input-group">
                    <label class="input-label">الرمز السري (7 أرقام)</label>
                    <input type="password" id="codeInput" class="military-input" 
                           placeholder="أدخل الرمز السري" maxlength="7" pattern="[0-9]{7}">
                </div>
                
                <button id="loginButton" class="military-button">
                    <span>دخول النظام المشفر</span>
                    <div class="button-decoration"></div>
                </button>
                
                <div id="loginError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="appContainer" class="app-container" style="display: none;">
        <!-- شريط الحالة العلوي -->
        <header class="status-bar">
            <div class="status-info">
                <span class="nation-name" id="nationNameDisplay">---</span>
                <span class="time-display" id="timeDisplay">1926</span>
            </div>
            <div class="status-indicators">
                <div class="budget-indicator">
                    <span class="budget-label">الميزانية:</span>
                    <span class="budget-value" id="budgetDisplay">0</span>
                </div>
                <div class="signal-strength">
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                </div>
            </div>
        </header>

        <!-- المحتوى الرئيسي -->
        <main class="main-content" id="mainContent">
            <!-- سيتم تحميل المحتوى ديناميكياً -->
        </main>

        <!-- شريط التنقل السفلي -->
        <nav class="bottom-nav">
            <button class="nav-button active" data-screen="news">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
                    </svg>
                </div>
                <span class="nav-label">الأرشيف</span>
            </button>
            
            <button class="nav-button" data-screen="chat">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                </div>
                <span class="nav-label">المراسلات</span>
            </button>
            
            <button class="nav-button" data-screen="military">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-.8-1H5v4H3z"/>
                    </svg>
                </div>
                <span class="nav-label">التسلح</span>
            </button>
            
            <button class="nav-button" data-screen="economy">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <span class="nav-label">الاقتصاد</span>
            </button>
            
            <button class="nav-button" data-screen="diplomacy">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <span class="nav-label">الدبلوماسية</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
