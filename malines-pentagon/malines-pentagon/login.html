<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>تسجيل الدخول — MALINES PENTAGON</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <header>
        <div class="logo">MALINES PENTAGON</div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="login.html">تسجيل الدخول</a>
            <a href="register.html">إنشاء حساب</a>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-box">
            <h2>تسجيل الدخول</h2>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="اسم المستخدم" required />
                <input type="password" id="loginPassword" placeholder="كلمة المرور" required />
                <button type="submit">دخول</button>
            </form>
            <p>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
            <div id="loginMessage"></div>
        </div>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
