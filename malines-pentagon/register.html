<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>إنشاء حساب — MALINES PENTAGON</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <header>
        <div class="logo">MALINES PENTAGON</div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="login.html">تسجيل الدخول</a>
            <a href="register.html">إنشاء حساب</a>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-box">
            <h2>إنشاء حساب جديد</h2>
            <form id="registerForm">
                <input type="text" id="regUsername" placeholder="اسم المستخدم" required />
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required />
                <input type="password" id="regPassword" placeholder="كلمة المرور" required />
                <button type="submit">تسجيل</button>
            </form>
            <p>لديك حساب؟ <a href="login.html">سجل الدخول</a></p>
            <div id="registerMessage"></div>
        </div>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
