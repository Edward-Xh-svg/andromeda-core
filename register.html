<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MALINES PENTAGON — إنشاء حساب</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="register">

  <div class="classification-bar">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>

  <div class="auth-page">
    <div class="auth-box" style="max-width:460px">

      <div class="auth-seal">
        <div class="seal-ring">MP</div>
        <h1>طلب انضمام</h1>
        <p>إنشاء حساب رسمي جديد</p>
      </div>

      <hr class="auth-divider">

      <div id="register-error" class="alert alert-error hidden"></div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="full_name">الاسم الكامل</label>
          <input type="text" id="full_name" class="form-control"
                 placeholder="الاسم كما يظهر في الوثائق الرسمية">
        </div>

        <div class="form-group">
          <label class="form-label" for="username">اسم المستخدم <span style="color:var(--danger)">*</span></label>
          <input type="text" id="username" class="form-control"
                 placeholder="حروف وأرقام فقط" pattern="[a-zA-Z0-9_]+" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">البريد الإلكتروني الرسمي <span style="color:var(--danger)">*</span></label>
          <input type="email" id="email" class="form-control"
                 placeholder="user@pentagon.mil" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="rank">الرتبة / المنصب</label>
          <select id="rank" class="form-control">
            <option value="">— اختر الرتبة —</option>
            <option value="Secretary of Defense">Secretary of Defense</option>
            <option value="General">General</option>
            <option value="Lieutenant General">Lieutenant General</option>
            <option value="Major General">Major General</option>
            <option value="Brigadier General">Brigadier General</option>
            <option value="Admiral">Admiral</option>
            <option value="Vice Admiral">Vice Admiral</option>
            <option value="Colonel">Colonel</option>
            <option value="Lieutenant Colonel">Lieutenant Colonel</option>
            <option value="Major">Major</option>
            <option value="Captain">Captain</option>
            <option value="Lieutenant">Lieutenant</option>
            <option value="Analyst">Intelligence Analyst</option>
            <option value="Attaché">Military Attaché</option>
            <option value="Civilian">Civilian Official</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label" for="password">كلمة المرور <span style="color:var(--danger)">*</span></label>
            <input type="password" id="password" class="form-control" placeholder="6 أحرف على الأقل" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password2">تأكيد المرور <span style="color:var(--danger)">*</span></label>
            <input type="password" id="password2" class="form-control" placeholder="أعد الكتابة" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          إنشاء حساب
        </button>
      </form>

      <hr class="auth-divider">

      <p class="text-center" style="font-size:13px;color:var(--muted)">
        لديك حساب بالفعل؟
        <a href="/login.html" style="color:var(--gold);font-weight:bold">تسجيل الدخول</a>
      </p>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
