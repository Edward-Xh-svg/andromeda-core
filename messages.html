<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MALINES PENTAGON — الرسائل</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="messages">

  <div class="classification-bar">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>

  <!-- TOPBAR -->
  <header class="topbar" style="top:22px">
    <div class="topbar-brand">
      <div class="brand-seal">MP</div>
      <div>
        <h1>MALINES PENTAGON</h1>
        <span>وزارة الدفاع الأمريكية — الشبكة الرسمية</span>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <span>مرحباً، <span class="username" id="topbar-username">—</span></span>
        <div class="avatar" id="topbar-avatar">—</div>
      </div>
      <button id="btn-logout" class="btn btn-outline btn-sm">خروج</button>
    </div>
  </header>

  <div style="max-width:1100px;margin:22px auto 0;padding:16px 20px;display:flex;gap:12px;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="/index.html" class="btn btn-outline btn-sm">&#8594; العودة</a>
      <h2 style="font-size:15px;letter-spacing:0.1em;text-transform:uppercase">الرسائل الخاصة</h2>
    </div>
    <button id="new-msg-btn" class="btn btn-primary btn-sm">+ محادثة جديدة</button>
  </div>

  <!-- NEW MESSAGE OVERLAY -->
  <div id="new-msg-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(6,23,45,0.7);z-index:200;display:flex;align-items:center;justify-content:center">
    <div style="background:var(--white);border:1px solid var(--gold);border-top:3px solid var(--gold);border-radius:var(--radius);width:400px;max-width:90vw;padding:24px;position:relative">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-size:14px;text-transform:uppercase;letter-spacing:0.1em">بحث عن مستخدم</h3>
        <button id="close-overlay" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted)">&#x2715;</button>
      </div>
      <input type="text" id="new-msg-search" class="form-control" placeholder="ابحث باسم المستخدم...">
      <div id="new-msg-results" style="margin-top:8px;max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius)"></div>
    </div>
  </div>

  <!-- MESSAGES LAYOUT -->
  <div style="max-width:1100px;margin:0 auto;padding:0 20px 20px">
    <div class="messages-layout" style="height:calc(100vh - 140px)">

      <!-- Conversation list -->
      <div class="convo-list">
        <div class="convo-list-header">المحادثات</div>
        <div id="convo-list">
          <div class="loading-overlay"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Chat panel -->
      <div id="messages-panel" class="messages-panel hidden">
        <div class="msg-header">
          <div class="avatar" style="width:32px;height:32px;font-size:12px" id="msg-header-avatar">—</div>
          <span class="username" id="msg-header-name">اختر محادثة</span>
        </div>
        <div class="msg-body" id="msg-body">
          <div class="empty-state">
            <div class="empty-icon">&#9679;</div>
            <p>اختر محادثة أو ابدأ واحدة جديدة.</p>
          </div>
        </div>
        <div class="msg-compose">
          <textarea id="msg-input" placeholder="اكتب رسالتك... (Enter للإرسال)" rows="1"></textarea>
          <button id="send-btn" class="btn btn-primary btn-sm">إرسال</button>
        </div>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/messages.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
