<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MALINES PENTAGON — تسجيل الدخول</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="login">

  <div class="classification-bar">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-seal">
        <div class="seal-ring">MP</div>
        <h1>MALINES PENTAGON</h1>
        <p>الشبكة الرسمية لوزارة الدفاع</p>
      </div>

      <hr class="auth-divider">

      <div id="login-error" class="alert alert-error hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">اسم المستخدم</label>
          <input type="text" id="username" class="form-control"
                 placeholder="أدخل اسم المستخدم" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">كلمة المرور</label>
          <input type="password" id="password" class="form-control"
                 placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top:4px">
          تسجيل الدخول
        </button>
      </form>

      <hr class="auth-divider">

      <p class="text-center" style="font-size:13px;color:var(--muted)">
        لا تملك حساباً؟
        <a href="/register.html" style="color:var(--gold);font-weight:bold">إنشاء حساب جديد</a>
      </p>

      <div style="margin-top:24px;padding:12px;background:var(--beige);border:1px solid var(--border);border-radius:var(--radius);font-size:11px;color:var(--muted);text-align:center;line-height:1.6">
        تسجيل الدخول يُعدّ موافقة ضمنية على بنود الاستخدام المقبول.
        جميع الجلسات مُراقَبة ومُسجَّلة لأغراض الأمن.
      </div>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
